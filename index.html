<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏎️ سباق السرعة الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* شاشة البداية */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
        }

        .glow-text {
            font-size: clamp(40px, 10vw, 80px);            font-weight: 900;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #ffff00);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 50px rgba(0,255,255,0.5);
            margin-bottom: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .start-btn {
            padding: 25px 80px;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 40px;
            box-shadow: 0 10px 50px rgba(0,255,255,0.5);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 70px rgba(0,255,255,0.8);
        }

        /* عداد السرعة */
        #speedometer {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 100%);
            border-radius: 50%;            border: 5px solid #00ffff;
            box-shadow: 0 0 40px rgba(0,255,255,0.6), inset 0 0 40px rgba(0,255,255,0.2);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }

        #speedValue {
            font-size: 64px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0,255,255,1);
            line-height: 1;
        }

        #speedLabel {
            font-size: 20px;
            color: #fff;
            margin-top: 5px;
        }

        /* الخريطة */
        #minimap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 220px;
            height: 180px;
            background: rgba(0,0,0,0.8);
            border: 4px solid #00ffff;
            border-radius: 15px;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(0,255,255,0.4);
        }

        /* أزرار التحكم */
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: none;
            z-index: 1000;
            gap: 10px;
        }

        .control-btn {            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #00ffff;
            background: rgba(0,0,0,0.7);
            color: #00ffff;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,255,255,0.4);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            transform: scale(0.9);
            background: rgba(0,255,255,0.3);
            box-shadow: 0 0 30px rgba(0,255,255,0.8);
        }

        .control-btn.large {
            width: 100px;
            height: 100px;
            border-color: #ff00ff;
            color: #ff00ff;
            font-size: 40px;
        }

        .control-btn.large:active {
            border-color: #ff00ff;
            background: rgba(255,0,255,0.3);
        }

        .steering-panel {
            position: fixed;
            bottom: 150px;
            left: 20px;
            display: none;
            z-index: 1000;
            gap: 10px;
        }

        /* زر الكاميرا */
        #viewToggle {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);            padding: 15px 25px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,255,255,0.5);
            z-index: 1000;
            display: none;
        }

        /* التعليمات */
        #instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #00ffff;
            color: white;
            display: none;
            z-index: 1000;
            max-width: 300px;
        }

        #instructions h3 {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 24px;
        }

        #instructions p {
            margin: 8px 0;
            font-size: 16px;
        }

        /* RPM Bar */
        #rpmContainer {
            position: fixed;
            top: 210px;
            right: 20px;
            width: 180px;
            height: 20px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #00ffff;
            border-radius: 10px;
            display: none;            z-index: 1000;
            overflow: hidden;
        }

        #rpmBar {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <!-- شاشة البداية -->
    <div id="startScreen">
        <h1 class="glow-text">🏁 سباق السرعة 🏁</h1>
        <p style="font-size: 28px; margin: 20px; color: #ccc;">لعبة سباق السيارات الاحترافية</p>
        <button class="start-btn" onclick="startGame()">🎮 ابدأ السباق</button>
        <p style="margin-top: 30px; font-size: 18px; color: #888;">استخدم المفاتيح أو الأزرار على الشاشة</p>
    </div>

    <!-- عداد السرعة -->
    <div id="speedometer">
        <div id="speedValue">0</div>
        <div id="speedLabel">km/h</div>
    </div>

    <!-- شريط RPM -->
    <div id="rpmContainer">
        <div id="rpmBar"></div>
    </div>

    <!-- الخريطة -->
    <canvas id="minimap"></canvas>

    <!-- التعليمات -->
    <div id="instructions">
        <h3>🎮 التحكم</h3>
        <p>⬆️ W/↑ : تسريع</p>
        <p>⬇️ S/↓ : فرامل</p>
        <p>⬅️️ A/D : اتجاه</p>
        <p>C : تبديل الكاميرا</p>
        <p style="margin-top: 15px; color: #ff00ff;">أو استخدم الأزرار على الشاشة</p>
    </div>

    <!-- أزرار التوجيه -->
    <div class="steering-panel" id="steeringPanel">
        <button class="control-btn large" id="btnLeft">⬅️</button>
        <button class="control-btn large" id="btnRight">➡️</button>
    </div>
    <!-- أزرار التحكم -->
    <div class="control-panel" id="controlPanel">
        <button class="control-btn large" id="btnBrake">🛑</button>
        <button class="control-btn large" id="btnGas">🚀</button>
    </div>

    <!-- زر الكاميرا -->
    <button id="viewToggle" onclick="toggleCamera()">📷 تبديل الكاميرا</button>

    <!-- مساحة اللعبة -->
    <div id="gameCanvas"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // المتغيرات العامة
        let scene, camera, renderer;
        let car, carBody, wheels = [];
        let speed = 0;
        let maxSpeed = 320;
        let gameRunning = false;
        let cameraView = 'external';
        let carPosition = { x: 0, z: 0 };
        let carPhysics = {
            velocity: 0,
            angle: 0,
            friction: 0.97,
            acceleration: 0.8,
            turnSpeed: 0.05
        };
        let keys = {};
        let clock = new THREE.Clock();
        let particles = [];
        let audioContext;

        // نظام الصوت
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playEngineSound(frequency, volume) {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = frequency;
            gainNode.gain.value = volume;            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        function playSound(type) {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'start') {
                oscillator.frequency.value = 440;
                gainNode.gain.value = 0.3;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.5);
            } else if (type === 'brake') {
                oscillator.frequency.value = 200;
                gainNode.gain.value = 0.2;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
            }
        }

        // بدء اللعبة
        function startGame() {
            initAudio();
            playSound('start');
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('speedometer').style.display = 'flex';
            document.getElementById('rpmContainer').style.display = 'block';
            document.getElementById('minimap').style.display = 'block';
            document.getElementById('instructions').style.display = 'block';
            document.getElementById('viewToggle').style.display = 'block';
            document.getElementById('controlPanel').style.display = 'flex';
            document.getElementById('steeringPanel').style.display = 'flex';
            gameRunning = true;
        }

        // تهيئة اللعبة
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87CEEB, 100, 1000);
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                2000            );

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('gameCanvas').appendChild(renderer.domElement);

            setupLights();
            createTrack();
            createDetailedCar();
            createEnvironment();
            setupEventListeners();
            setupTouchControls();

            animate();
        }

        function setupLights() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(100, 200, 100);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -200;
            sunLight.shadow.camera.right = 200;
            sunLight.shadow.camera.top = 200;
            sunLight.shadow.camera.bottom = -200;
            sunLight.shadow.mapSize.width = 4096;
            sunLight.shadow.mapSize.height = 4096;
            scene.add(sunLight);

            const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3d5c3d, 0.5);
            scene.add(hemiLight);
        }

        function createTrack() {
            // الحلبة
            const trackShape = new THREE.Shape();
            const trackRadius = 300;
            const trackWidth = 50;
            
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const radius = trackRadius + Math.sin(angle * 4) * 50;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                                if (i === 0) trackShape.moveTo(x, z);
                else trackShape.lineTo(x, z);
            }

            const roadGeometry = new THREE.ExtrudeGeometry(trackShape, {
                depth: trackWidth,
                bevelEnabled: false
            });

            const roadMaterial = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.8,
                metalness: 0.2
            });

            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.1;
            road.receiveShadow = true;
            scene.add(road);

            // خطوط الحلبة
            createTrackMarkings(trackShape, trackRadius, trackWidth);

            // الأرضية
            const groundGeometry = new THREE.PlaneGeometry(2000, 2000);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x2d5a2d,
                roughness: 1
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function createTrackMarkings(shape, radius, width) {
            // الخطوط البيضاء
            const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            for (let i = 0; i < 32; i++) {
                const angle = (i / 32) * Math.PI * 2;
                const lineRadius = radius;
                const x = Math.cos(angle) * lineRadius;
                const z = Math.sin(angle) * lineRadius;
                
                const lineGeo = new THREE.PlaneGeometry(10, 2);
                const line = new THREE.Mesh(lineGeo, lineMaterial);
                line.rotation.x = -Math.PI / 2;                line.position.set(x, 0.3, z);
                line.lookAt(0, 0.3, 0);
                scene.add(line);
            }
        }

        function createDetailedCar() {
            car = new THREE.Group();

            // جسم السيارة الرئيسي - تصميم رياضي
            const bodyGeometry = new THREE.BoxGeometry(2.2, 0.8, 5);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: 0x0066ff,
                roughness: 0.1,
                metalness: 0.9,
                envMapIntensity: 1
            });
            carBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
            carBody.position.y = 0.8;
            carBody.castShadow = true;
            car.add(carBody);

            // الجزء العلوي
            const topGeometry = new THREE.BoxGeometry(2, 0.6, 2.5);
            const topMaterial = new THREE.MeshStandardMaterial({
                color: 0x003399,
                roughness: 0.1,
                metalness: 0.9
            });
            const top = new THREE.Mesh(topGeometry, topMaterial);
            top.position.set(0, 1.5, -0.2);
            top.castShadow = true;
            car.add(top);

            // الزجاج الأمامي المائل
            const windshieldShape = new THREE.Shape();
            windshieldShape.moveTo(-1, 0);
            windshieldShape.lineTo(1, 0);
            windshieldShape.lineTo(0.8, 1);
            windshieldShape.lineTo(-0.8, 1);
            windshieldShape.lineTo(-1, 0);

            const windshieldGeo = new THREE.ExtrudeGeometry(windshieldShape, { depth: 0.1 });
            const glassMaterial = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.7
            });            const windshield = new THREE.Mesh(windshieldGeo, glassMaterial);
            windshield.position.set(0, 1.1, 1.3);
            windshield.rotation.x = -0.3;
            car.add(windshield);

            // spoiler خلفي
            const spoilerGeometry = new THREE.BoxGeometry(2.4, 0.2, 0.8);
            const spoilerMaterial = new THREE.MeshStandardMaterial({
                color: 0x000000,
                roughness: 0.3,
                metalness: 0.8
            });
            const spoiler = new THREE.Mesh(spoilerGeometry, spoilerMaterial);
            spoiler.position.set(0, 1.8, -2);
            spoiler.castShadow = true;
            car.add(spoiler);

            // دعامات الـ spoiler
            const supportGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
            const leftSupport = new THREE.Mesh(supportGeo, spoilerMaterial);
            leftSupport.position.set(-0.8, 1.4, -2);
            car.add(leftSupport);
            
            const rightSupport = new THREE.Mesh(supportGeo, spoilerMaterial);
            rightSupport.position.set(0.8, 1.4, -2);
            car.add(rightSupport);

            // العجلات التفصيلية
            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
            const wheelMaterial = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.9,
                metalness: 0.5
            });

            const rimGeometry = new THREE.CylinderGeometry(0.35, 0.35, 0.41, 16);
            const rimMaterial = new THREE.MeshStandardMaterial({
                color: 0xcccccc,
                roughness: 0.2,
                metalness: 0.9
            });

            const wheelPositions = [
                [-1.3, 0.5, 1.6],
                [1.3, 0.5, 1.6],
                [-1.3, 0.5, -1.6],
                [1.3, 0.5, -1.6]
            ];

            wheelPositions.forEach((pos) => {                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                wheel.castShadow = true;
                car.add(wheel);
                wheels.push(wheel);

                // الجنوط
                const rim = new THREE.Mesh(rimGeometry, rimMaterial);
                rim.rotation.z = Math.PI / 2;
                rim.position.set(...pos);
                car.add(rim);
            });

            // الأضواء الأمامية
            const headlightGeometry = new THREE.BoxGeometry(0.6, 0.3, 0.2);
            const headlightMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.9
            });

            const leftHeadlight = new THREE.Mesh(headlightGeometry, headlightMaterial);
            leftHeadlight.position.set(-0.8, 0.8, 2.5);
            car.add(leftHeadlight);

            const rightHeadlight = new THREE.Mesh(headlightGeometry, headlightMaterial);
            rightHeadlight.position.set(0.8, 0.8, 2.5);
            car.add(rightHeadlight);

            // الأضواء الخلفية الحمراء
            const tailLightGeometry = new THREE.BoxGeometry(0.7, 0.3, 0.1);
            const tailLightMaterial = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.9
            });

            const leftTailLight = new THREE.Mesh(tailLightGeometry, tailLightMaterial);
            leftTailLight.position.set(-0.8, 0.8, -2.5);
            car.add(leftTailLight);

            const rightTailLight = new THREE.Mesh(tailLightGeometry, tailLightMaterial);
            rightTailLight.position.set(0.8, 0.8, -2.5);
            car.add(rightTailLight);

            // أنبوب العادم
            const exhaustGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16);
            const exhaustMaterial = new THREE.MeshStandardMaterial({
                color: 0x666666,                roughness: 0.4,
                metalness: 0.9
            });
            const exhaust = new THREE.Mesh(exhaustGeometry, exhaustMaterial);
            exhaust.rotation.x = Math.PI / 2;
            exhaust.position.set(0.6, 0.5, -2.6);
            car.add(exhaust);

            car.position.set(0, 0, 0);
            scene.add(car);
        }

        function createEnvironment() {
            // المدرجات
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const radius = 450;
                
                const standGeometry = new THREE.BoxGeometry(80, 30, 40);
                const standMaterial = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(Math.random(), 0.5, 0.5)
                });
                const stand = new THREE.Mesh(standGeometry, standMaterial);
                
                stand.position.set(
                    Math.cos(angle) * radius,
                    15,
                    Math.sin(angle) * radius
                );
                stand.lookAt(0, 15, 0);
                stand.castShadow = true;
                scene.add(stand);
            }

            // الأعلام
            const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff];
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 380 + Math.random() * 100;
                
                const poleGeometry = new THREE.CylinderGeometry(0.2, 0.2, 15);
                const poleMaterial = new THREE.MeshStandardMaterial({ color: 0x666666 });
                const pole = new THREE.Mesh(poleGeometry, poleMaterial);
                pole.position.set(Math.cos(angle) * radius, 7.5, Math.sin(angle) * radius);
                scene.add(pole);

                const flagGeometry = new THREE.BoxGeometry(5, 3, 0.1);
                const flagMaterial = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)]
                });                const flag = new THREE.Mesh(flagGeometry, flagMaterial);
                flag.position.set(Math.cos(angle) * radius + 2.5, 14, Math.sin(angle) * radius);
                scene.add(flag);
            }

            // الأبراج
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2;
                const radius = 420;
                
                const towerGeometry = new THREE.BoxGeometry(20, 60, 20);
                const towerMaterial = new THREE.MeshStandardMaterial({
                    color: 0x444444,
                    roughness: 0.7
                });
                const tower = new THREE.Mesh(towerGeometry, towerMaterial);
                
                tower.position.set(
                    Math.cos(angle) * radius,
                    30,
                    Math.sin(angle) * radius
                );
                tower.castShadow = true;
                scene.add(tower);
            }
        }

        function setupEventListeners() {
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyC') toggleCamera();
            });
            
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function setupTouchControls() {
            // زر الغاز
            const btnGas = document.getElementById('btnGas');
            btnGas.addEventListener('touchstart', (e) => { e.preventDefault(); keys['KeyW'] = true; });
            btnGas.addEventListener('touchend', (e) => { e.preventDefault(); keys['KeyW'] = false; });
            btnGas.addEventListener('mousedown', () => { keys['KeyW'] = true; });            btnGas.addEventListener('mouseup', () => { keys['KeyW'] = false; });

            // زر الفرامل
            const btnBrake = document.getElementById('btnBrake');
            btnBrake.addEventListener('touchstart', (e) => { e.preventDefault(); keys['KeyS'] = true; playSound('brake'); });
            btnBrake.addEventListener('touchend', (e) => { e.preventDefault(); keys['KeyS'] = false; });
            btnBrake.addEventListener('mousedown', () => { keys['KeyS'] = true; playSound('brake'); });
            btnBrake.addEventListener('mouseup', () => { keys['KeyS'] = false; });

            // زر اليسار
            const btnLeft = document.getElementById('btnLeft');
            btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys['KeyA'] = true; });
            btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys['KeyA'] = false; });
            btnLeft.addEventListener('mousedown', () => { keys['KeyA'] = true; });
            btnLeft.addEventListener('mouseup', () => { keys['KeyA'] = false; });

            // زر اليمين
            const btnRight = document.getElementById('btnRight');
            btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys['KeyD'] = true; });
            btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keys['KeyD'] = false; });
            btnRight.addEventListener('mousedown', () => { keys['KeyD'] = true; });
            btnRight.addEventListener('mouseup', () => { keys['KeyD'] = false; });
        }

        function toggleCamera() {
            cameraView = cameraView === 'external' ? 'internal' : 'external';
        }

        function createSmoke(x, y, z) {
            const geometry = new THREE.SphereGeometry(0.3, 8, 8);
            const material = new THREE.MeshBasicMaterial({
                color: 0x888888,
                transparent: true,
                opacity: 0.6
            });
            const particle = new THREE.Mesh(geometry, material);
            particle.position.set(x, y, z);
            scene.add(particle);
            
            particles.push({
                mesh: particle,
                life: 1.0,
                velocity: {
                    x: (Math.random() - 0.5) * 0.1,
                    y: 0.1 + Math.random() * 0.1,
                    z: (Math.random() - 0.5) * 0.1
                }
            });
        }
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= 0.02;
                p.mesh.position.x += p.velocity.x;
                p.mesh.position.y += p.velocity.y;
                p.mesh.position.z += p.velocity.z;
                p.mesh.material.opacity = p.life * 0.6;
                p.mesh.scale.multiplyScalar(1.05);
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function updateCar() {
            if (!gameRunning) return;

            if (keys['KeyW'] || keys['ArrowUp']) {
                carPhysics.velocity += carPhysics.acceleration;
                if (Math.random() > 0.7) {
                    createSmoke(car.position.x, 0.5, car.position.z - 2.5);
                }
            }
            if (keys['KeyS'] || keys['ArrowDown']) {
                carPhysics.velocity -= 1.5;
            }

            carPhysics.velocity *= carPhysics.friction;

            if (carPhysics.velocity > maxSpeed) carPhysics.velocity = maxSpeed;

            if (Math.abs(carPhysics.velocity) > 1) {
                const turnAmount = carPhysics.turnSpeed * (carPhysics.velocity / maxSpeed);
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    carPhysics.angle += turnAmount;
                }
                if (keys['KeyD'] || keys['ArrowRight']) {
                    carPhysics.angle -= turnAmount;
                }
            }

            carPosition.x += Math.sin(carPhysics.angle) * carPhysics.velocity * 0.01;
            carPosition.z += Math.cos(carPhysics.angle) * carPhysics.velocity * 0.01;

            car.position.x = carPosition.x;
            car.position.z = carPosition.z;
            car.rotation.y = carPhysics.angle;
            speed = Math.abs(Math.floor(carPhysics.velocity));
            document.getElementById('speedValue').textContent = speed;
            
            // تحديث شريط RPM
            const rpmPercent = (speed / maxSpeed) * 100;
            document.getElementById('rpmBar').style.width = rpmPercent + '%';

            // تدوير العجلات
            wheels.forEach(wheel => {
                wheel.rotation.x += carPhysics.velocity * 0.02;
            });

            updateCamera();
            updateMinimap();
            updateParticles();
        }

        function updateCamera() {
            if (cameraView === 'external') {
                const relativeCameraOffset = new THREE.Vector3(0, 6, -15);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(car.position.x, car.position.y + 2, car.position.z);
            } else {
                const relativeCameraOffset = new THREE.Vector3(0, 2.5, 0.5);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                camera.position.copy(cameraOffset);
                const lookAtOffset = new THREE.Vector3(0, 2, 10);
                const lookAtPosition = lookAtOffset.applyMatrix4(car.matrixWorld);
                camera.lookAt(lookAtPosition);
            }
        }

        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const ctx = canvas.getContext('2d');
            canvas.width = 220;
            canvas.height = 180;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, 220, 180);

            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 15;
            ctx.beginPath();
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const radius = 100 + Math.sin(angle * 4) * 16;
                const x = 110 + Math.cos(angle) * radius * 0.35;                const y = 90 + Math.sin(angle) * radius * 0.35;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            const carX = 110 + carPosition.x * 0.35;
            const carY = 90 + carPosition.z * 0.35;
            
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(carX, carY, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCar();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
