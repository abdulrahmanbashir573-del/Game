<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏎️ سباق السرعة - نسخة التابلت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Arial', sans-serif;
        }

        body {
            overflow: hidden;
            background: #000;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* شاشة البداية */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
        }

        #startScreen h1 {
            font-size: clamp(36px, 10vw, 60px);            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 30px rgba(0,255,255,0.8);
        }

        #startBtn {
            padding: 20px 60px;
            font-size: 28px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,255,136,0.4);
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        /* عداد السرعة */
        #speedometer {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 100%);
            border-radius: 50%;
            border: 4px solid #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }

        #speedValue {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
        }

        #speedLabel {
            font-size: 16px;
            color: #fff;        }

        /* الخريطة */
        #minimap {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 150px;
            height: 120px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #00ff88;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }

        /* أزرار التحكم - كبيرة للتابلت */
        .controls-container {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .steering-controls {
            display: flex;
            gap: 15px;
        }

        .speed-controls {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #00ff88;
            background: rgba(0,0,0,0.6);
            color: #00ff88;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,255,136,0.4);
            display: flex;            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .control-btn:active {
            transform: scale(0.9);
            background: rgba(0,255,136,0.3);
            box-shadow: 0 0 30px rgba(0,255,136,0.8);
        }

        .control-btn.large {
            width: 110px;
            height: 110px;
            border-color: #ff0066;
            color: #ff0066;
            font-size: 48px;
        }

        .control-btn.large:active {
            background: rgba(255,0,102,0.3);
        }

        /* زر الكاميرا */
        #viewToggle {
            position: fixed;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            padding: 15px 20px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,255,136,0.5);
            z-index: 1000;
            display: none;
        }

        /* التعليمات */
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;            border: 2px solid #00ff88;
            color: white;
            display: none;
            z-index: 1000;
            font-size: 14px;
            max-width: 200px;
        }

        #info h3 {
            color: #00ff88;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- شاشة البداية -->
    <div id="startScreen">
        <h1>🏁 سباق السرعة 🏁</h1>
        <p style="font-size: 20px; margin: 10px;">نسخة التابلت المحسّنة</p>
        <button id="startBtn" onclick="startGame()">🎮 ابدأ السباق</button>
    </div>

    <!-- عداد السرعة -->
    <div id="speedometer">
        <div id="speedValue">0</div>
        <div id="speedLabel">km/h</div>
    </div>

    <!-- الخريطة -->
    <canvas id="minimap"></canvas>

    <!-- التعليمات -->
    <div id="info">
        <h3>🎮 التحكم</h3>
        <p>استخدم الأزرار على الشاشة</p>
        <p>🚀 = تسريع</p>
        <p>🛑 = فرامل</p>
        <p>⬅️ ➡️ = اتجاه</p>
    </div>

    <!-- زر الكاميرا -->
    <button id="viewToggle" onclick="toggleCamera()">📷 كاميرا</button>

    <!-- أزرار التحكم -->
    <div class="controls-container" id="controls">
        <div class="steering-controls">
            <button class="control-btn" id="btnLeft">⬅️</button>
            <button class="control-btn" id="btnRight">➡️</button>
        </div>
        <div class="speed-controls">            <button class="control-btn large" id="btnBrake">🛑</button>
            <button class="control-btn large" id="btnGas">🚀</button>
        </div>
    </div>

    <!-- مساحة اللعبة -->
    <div id="gameCanvas"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // المتغيرات
        let scene, camera, renderer;
        let car, wheels = [];
        let speed = 0;
        let maxSpeed = 250;
        let gameRunning = false;
        let cameraView = 'external';
        let carPosition = { x: 0, z: 0 };
        let carPhysics = {
            velocity: 0,
            angle: 0,
            friction: 0.96,
            acceleration: 0.6,
            turnSpeed: 0.04
        };
        let keys = {};

        // بدء اللعبة
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('speedometer').style.display = 'flex';
            document.getElementById('minimap').style.display = 'block';
            document.getElementById('info').style.display = 'block';
            document.getElementById('viewToggle').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            gameRunning = true;
        }

        // تهيئة اللعبة
        function init() {
            // المشهد
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87CEEB, 50, 300);
            scene.background = new THREE.Color(0x87CEEB);

            // الكاميرا
            camera = new THREE.PerspectiveCamera(
                75,                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );

            // الريندر - محسّن للتابلت
            renderer = new THREE.WebGLRenderer({ 
                antialias: false, // عشان الأداء
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // تحسين للتابلت
            renderer.shadowMap.enabled = false; // عشان الأداء
            document.getElementById('gameCanvas').appendChild(renderer.domElement);

            // الإضاءة
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(50, 100, 50);
            scene.add(sunLight);

            // إنشاء الحلبة
            createTrack();

            // إنشاء السيارة
            createCar();

            // البيئة
            createEnvironment();

            // التحكم باللمس
            setupTouchControls();

            // الأحداث
            window.addEventListener('resize', onWindowResize, false);

            // البدء
            animate();
        }

        function createTrack() {
            // الحلبة البسيطة
            const trackShape = new THREE.Shape();
            const trackRadius = 80;
            const trackWidth = 25;
            
            for (let i = 0; i <= 32; i++) {
                const angle = (i / 32) * Math.PI * 2;                const radius = trackRadius + Math.sin(angle * 3) * 20;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                if (i === 0) trackShape.moveTo(x, z);
                else trackShape.lineTo(x, z);
            }

            const roadGeometry = new THREE.ExtrudeGeometry(trackShape, {
                depth: trackWidth,
                bevelEnabled: false
            });

            const roadMaterial = new THREE.MeshBasicMaterial({
                color: 0x333333
            });

            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.1;
            scene.add(road);

            // الأرضية
            const groundGeometry = new THREE.PlaneGeometry(500, 500);
            const groundMaterial = new THREE.MeshBasicMaterial({
                color: 0x2d5a2d
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            scene.add(ground);
        }

        function createCar() {
            car = new THREE.Group();

            // جسم السيارة
            const bodyGeometry = new THREE.BoxGeometry(2, 1, 4);
            const bodyMaterial = new THREE.MeshBasicMaterial({
                color: 0x0066ff
            });
            const carBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
            carBody.position.y = 1;
            car.add(carBody);

            // الجزء العلوي
            const topGeometry = new THREE.BoxGeometry(1.8, 0.6, 2);
            const topMaterial = new THREE.MeshBasicMaterial({
                color: 0x003399
            });            const top = new THREE.Mesh(topGeometry, topMaterial);
            top.position.set(0, 1.8, -0.2);
            car.add(top);

            // العجلات
            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
            const wheelMaterial = new THREE.MeshBasicMaterial({
                color: 0x111111
            });

            const wheelPositions = [
                [-1.2, 0.5, 1.4],
                [1.2, 0.5, 1.4],
                [-1.2, 0.5, -1.4],
                [1.2, 0.5, -1.4]
            ];

            wheelPositions.forEach((pos) => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                car.add(wheel);
                wheels.push(wheel);
            });

            car.position.set(0, 0, 0);
            scene.add(car);
        }

        function createEnvironment() {
            // أعلام بسيطة
            const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00];
            for (let i = 0; i < 16; i++) {
                const angle = (i / 16) * Math.PI * 2;
                const radius = 110;
                
                const poleGeometry = new THREE.CylinderGeometry(0.2, 0.2, 8);
                const poleMaterial = new THREE.MeshBasicMaterial({ color: 0x666666 });
                const pole = new THREE.Mesh(poleGeometry, poleMaterial);
                pole.position.set(Math.cos(angle) * radius, 4, Math.sin(angle) * radius);
                scene.add(pole);

                const flagGeometry = new THREE.BoxGeometry(3, 2, 0.1);
                const flagMaterial = new THREE.MeshBasicMaterial({
                    color: colors[i % colors.length]
                });
                const flag = new THREE.Mesh(flagGeometry, flagMaterial);
                flag.position.set(Math.cos(angle) * radius + 1.5, 7.5, Math.sin(angle) * radius);
                scene.add(flag);
            }        }

        function setupTouchControls() {
            // زر الغاز
            const btnGas = document.getElementById('btnGas');
            btnGas.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                keys['KeyW'] = true; 
            });
            btnGas.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                keys['KeyW'] = false; 
            });
            btnGas.addEventListener('mousedown', () => { keys['KeyW'] = true; });
            btnGas.addEventListener('mouseup', () => { keys['KeyW'] = false; });

            // زر الفرامل
            const btnBrake = document.getElementById('btnBrake');
            btnBrake.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                keys['KeyS'] = true; 
            });
            btnBrake.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                keys['KeyS'] = false; 
            });
            btnBrake.addEventListener('mousedown', () => { keys['KeyS'] = true; });
            btnBrake.addEventListener('mouseup', () => { keys['KeyS'] = false; });

            // زر اليسار
            const btnLeft = document.getElementById('btnLeft');
            btnLeft.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                keys['KeyA'] = true; 
            });
            btnLeft.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                keys['KeyA'] = false; 
            });
            btnLeft.addEventListener('mousedown', () => { keys['KeyA'] = true; });
            btnLeft.addEventListener('mouseup', () => { keys['KeyA'] = false; });

            // زر اليمين
            const btnRight = document.getElementById('btnRight');
            btnRight.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                keys['KeyD'] = true; 
            });
            btnRight.addEventListener('touchend', (e) => { 
                e.preventDefault();                 keys['KeyD'] = false; 
            });
            btnRight.addEventListener('mousedown', () => { keys['KeyD'] = true; });
            btnRight.addEventListener('mouseup', () => { keys['KeyD'] = false; });
        }

        function toggleCamera() {
            cameraView = cameraView === 'external' ? 'internal' : 'external';
        }

        function updateCar() {
            if (!gameRunning) return;

            // التسريع
            if (keys['KeyW']) {
                carPhysics.velocity += carPhysics.acceleration;
            }
            if (keys['KeyS']) {
                carPhysics.velocity -= 1.2;
            }

            // الاحتكاك
            carPhysics.velocity *= carPhysics.friction;

            // الحد الأقصى
            if (carPhysics.velocity > maxSpeed) carPhysics.velocity = maxSpeed;

            // التوجيه
            if (Math.abs(carPhysics.velocity) > 1) {
                const turnAmount = carPhysics.turnSpeed * (carPhysics.velocity / maxSpeed);
                if (keys['KeyA']) {
                    carPhysics.angle += turnAmount;
                }
                if (keys['KeyD']) {
                    carPhysics.angle -= turnAmount;
                }
            }

            // تحديث الموقع
            carPosition.x += Math.sin(carPhysics.angle) * carPhysics.velocity * 0.01;
            carPosition.z += Math.cos(carPhysics.angle) * carPhysics.velocity * 0.01;

            car.position.x = carPosition.x;
            car.position.z = carPosition.z;
            car.rotation.y = carPhysics.angle;

            // السرعة
            speed = Math.abs(Math.floor(carPhysics.velocity));
            document.getElementById('speedValue').textContent = speed;
            // تدوير العجلات
            wheels.forEach(wheel => {
                wheel.rotation.x += carPhysics.velocity * 0.02;
            });

            updateCamera();
            updateMinimap();
        }

        function updateCamera() {
            if (cameraView === 'external') {
                const relativeCameraOffset = new THREE.Vector3(0, 4, -10);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(car.position.x, car.position.y + 1, car.position.z);
            } else {
                const relativeCameraOffset = new THREE.Vector3(0, 2, 0.3);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                camera.position.copy(cameraOffset);
                const lookAtOffset = new THREE.Vector3(0, 2, 8);
                const lookAtPosition = lookAtOffset.applyMatrix4(car.matrixWorld);
                camera.lookAt(lookAtPosition);
            }
        }

        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const ctx = canvas.getContext('2d');
            canvas.width = 150;
            canvas.height = 120;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, 150, 120);

            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 12;
            ctx.beginPath();
            for (let i = 0; i <= 32; i++) {
                const angle = (i / 32) * Math.PI * 2;
                const radius = 40 + Math.sin(angle * 3) * 10;
                const x = 75 + Math.cos(angle) * radius * 0.5;
                const y = 60 + Math.sin(angle) * radius * 0.5;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            const carX = 75 + carPosition.x * 0.5;
            const carY = 60 + carPosition.z * 0.5;            
            ctx.fillStyle = '#ff0066';
            ctx.beginPath();
            ctx.arc(carX, carY, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCar();
            renderer.render(scene, camera);
        }

        // بدء اللعبة
        window.onload = init;
    </script>
</body>
</html>
