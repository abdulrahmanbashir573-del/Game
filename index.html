<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سباق السيارات الواقعية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* واجهة السرعة */
        #speedometer {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
            border-radius: 50%;
            border: 4px solid #00ffff;
            box-shadow: 0 0 30px rgba(0,255,255,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }

        #speedValue {
            font-size: 64px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0,255,255,0.8);
        }
        #speedLabel {
            font-size: 20px;
            color: #fff;
        }

        /* الخريطة المصغرة */
        #minimap {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 250px;
            height: 200px;
            background: rgba(0,0,0,0.7);
            border: 3px solid #00ffff;
            border-radius: 10px;
            z-index: 100;
        }

        /* أزرار التحكم */
        #controls {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            color: white;
            z-index: 100;
        }

        #controls h3 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        #controls p {
            margin: 5px 0;
            font-size: 14px;
        }

        /* زر تبديل المنظور */
        #viewToggle {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            padding: 15px 30px;
            background: linear-gradient(135deg, #00ffff, #0080ff);            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,255,255,0.4);
            z-index: 100;
            transition: all 0.3s;
        }

        #viewToggle:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 8px 30px rgba(0,255,255,0.6);
        }

        /* عداد اللفات */
        #lapCounter {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 40px;
            border-radius: 30px;
            border: 3px solid #ff00ff;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
        }

        /* شاشة البداية */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
        }

        #startScreen h1 {
            font-size: 72px;            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(0,255,255,0.5);
        }

        #startButton {
            padding: 20px 60px;
            font-size: 28px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,255,255,0.4);
            transition: all 0.3s;
        }

        #startButton:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 60px rgba(0,255,255,0.6);
        }
    </style>
</head>
<body>
    <!-- شاشة البداية -->
    <div id="startScreen">
        <h1>🏁 سباق السرعة 🏁</h1>
        <p style="font-size: 24px; margin: 20px;">لعبة سباق السيارات الواقعية</p>
        <button id="startButton">ابدأ السباق</button>
    </div>

    <!-- عداد السرعة -->
    <div id="speedometer" style="display: none;">
        <div id="speedValue">0</div>
        <div id="speedLabel">km/h</div>
    </div>

    <!-- عداد اللفات -->
    <div id="lapCounter" style="display: none;">
        اللفة: <span id="currentLap">1</span> / 3
    </div>

    <!-- الخريطة المصغرة -->
    <canvas id="minimap" style="display: none;"></canvas>

    <!-- أزرار التحكم -->    <div id="controls" style="display: none;">
        <h3>🎮 التحكم</h3>
        <p>⬆️ W أو السهم للأعلى: تسريع</p>
        <p>⬇️ S أو السهم للأسفل: فرامل</p>
        <p>⬅️ ➡️ A/D أو الأسهم: اتجاه</p>
        <p>SPACE: فرامل يد</p>
        <p>C: تبديل الكاميرا</p>
    </div>

    <!-- زر تبديل المنظور -->
    <button id="viewToggle" style="display: none;">تبديل المنظور</button>

    <!-- مساحة اللعبة -->
    <div id="gameCanvas"></div>

    <!-- مكتبة Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ==================== المتغيرات العامة ====================
        let scene, camera, renderer;
        let car, carBody, wheels = [];
        let track, road;
        let speed = 0;
        let maxSpeed = 287; // كم/ساعة كما في الصورة
        let acceleration = 0;
        let steering = 0;
        let carPosition = { x: 0, z: 0 };
        let cameraView = 'external'; // 'external' أو 'internal'
        let gameRunning = false;
        let clock = new THREE.Clock();
        let lap = 1;
        
        // فيزياء السيارة
        let carPhysics = {
            velocity: 0,
            angle: 0,
            friction: 0.98,
            acceleration: 0.5,
            braking: 1.0,
            turnSpeed: 0.04
        };

        // ==================== تهيئة اللعبة ====================
        function init() {
            // إنشاء المشهد
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87CEEB, 100, 1000);

            // الكاميرا            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                2000
            );

            // الريندر
            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.getElementById('gameCanvas').appendChild(renderer.domElement);

            // الإضاءة
            setupLighting();

            // إنشاء الحلبة
            createTrack();

            // إنشاء السيارة
            createCar();

            // البيئة المحيطة
            createEnvironment();

            // الأحداث
            setupEventListeners();

            // بدء الحلقة الرئيسية
            animate();
        }

        // ==================== الإضاءة ====================
        function setupLighting() {
            // إضاءة محيطة
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // إضاءة شمسية
            const sunLight = new THREE.DirectionalLight(0xffffff, 1);
            sunLight.position.set(100, 200, 100);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -200;
            sunLight.shadow.camera.right = 200;            sunLight.shadow.camera.top = 200;
            sunLight.shadow.camera.bottom = -200;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 500;
            sunLight.shadow.mapSize.width = 4096;
            sunLight.shadow.mapSize.height = 4096;
            scene.add(sunLight);

            // إضاءة إضافية
            const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3d5c3d, 0.5);
            scene.add(hemiLight);
        }

        // ==================== إنشاء الحلبة ====================
        function createTrack() {
            // الحلبة الرئيسية
            const trackShape = new THREE.Shape();
            const trackRadius = 300;
            const trackWidth = 40;
            
            // رسم مسار دائري مع منعطفات
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const radius = trackRadius + Math.sin(angle * 4) * 50;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                if (i === 0) {
                    trackShape.moveTo(x, z);
                } else {
                    trackShape.lineTo(x, z);
                }
            }

            // الطريق
            const roadGeometry = new THREE.ExtrudeGeometry(trackShape, {
                depth: trackWidth,
                bevelEnabled: false
            });

            const roadMaterial = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.8,
                metalness: 0.2
            });

            road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.1;
            road.receiveShadow = true;            scene.add(road);

            // خطوط الحلبة
            createTrackLines(trackShape, trackRadius, trackWidth);

            // الجدران الجانبية
            createTrackBarriers(trackShape, trackRadius, trackWidth);
        }

        function createTrackLines(shape, radius, width) {
            // الخط الأبيض في المنتصف
            const lineMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide
            });

            const lineGeometry = new THREE.RingGeometry(radius - 1, radius + 1, 64);
            const line = new THREE.Mesh(lineGeometry, lineMaterial);
            line.rotation.x = -Math.PI / 2;
            line.position.y = 0.2;
            scene.add(line);
        }

        function createTrackBarriers(shape, radius, width) {
            // حواجز برتقالية وبيضاء
            const barrierMaterial1 = new THREE.MeshStandardMaterial({ color: 0xff6600 });
            const barrierMaterial2 = new THREE.MeshStandardMaterial({ color: 0xffffff });

            for (let i = 0; i < 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const barrierRadius = radius + width/2 + 5;
                const x = Math.cos(angle) * barrierRadius;
                const z = Math.sin(angle) * barrierRadius;

                const barrierGeo = new THREE.BoxGeometry(10, 2, 2);
                const barrierMat = i % 2 === 0 ? barrierMaterial1 : barrierMaterial2;
                const barrier = new THREE.Mesh(barrierGeo, barrierMat);
                
                barrier.position.set(x, 1, z);
                barrier.rotation.y = -angle;
                barrier.castShadow = true;
                scene.add(barrier);
            }
        }

        // ==================== إنشاء السيارة ====================
        function createCar() {
            car = new THREE.Group();

            // جسم السيارة (كما في الصورة - سيارة زرقاء رياضية)            const bodyGeometry = new THREE.BoxGeometry(2.5, 1, 5);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: 0x0066ff, // أزرق كما في الصورة
                roughness: 0.2,
                metalness: 0.8,
                envMapIntensity: 1
            });
            carBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
            carBody.position.y = 1;
            carBody.castShadow = true;
            car.add(carBody);

            // الجزء العلوي
            const topGeometry = new THREE.BoxGeometry(2.2, 0.6, 2.5);
            const topMaterial = new THREE.MeshStandardMaterial({
                color: 0x003399,
                roughness: 0.2,
                metalness: 0.8
            });
            const top = new THREE.Mesh(topGeometry, topMaterial);
            top.position.set(0, 1.8, -0.3);
            top.castShadow = true;
            car.add(top);

            // الزجاج الأمامي
            const windshieldGeometry = new THREE.BoxGeometry(2.21, 0.5, 1);
            const glassMaterial = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.7
            });
            const windshield = new THREE.Mesh(windshieldGeometry, glassMaterial);
            windshield.position.set(0, 1.8, 1);
            car.add(windshield);

            // العجلات
            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
            const wheelMaterial = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.9,
                metalness: 0.5
            });

            const wheelPositions = [
                [-1.4, 0.5, 1.5],   // أمامي يسار
                [1.4, 0.5, 1.5],    // أمامي يمين
                [-1.4, 0.5, -1.5],  // خلفي يسار
                [1.4, 0.5, -1.5]    // خلفي يمين            ];

            wheelPositions.forEach((pos, index) => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                wheel.castShadow = true;
                car.add(wheel);
                wheels.push(wheel);
            });

            // الأضواء الخلفية الحمراء
            const tailLightGeometry = new THREE.BoxGeometry(0.6, 0.3, 0.1);
            const tailLightMaterial = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.9
            });

            const leftTailLight = new THREE.Mesh(tailLightGeometry, tailLightMaterial);
            leftTailLight.position.set(-0.8, 1, -2.5);
            car.add(leftTailLight);

            const rightTailLight = new THREE.Mesh(tailLightGeometry, tailLightMaterial);
            rightTailLight.position.set(0.8, 1, -2.5);
            car.add(rightTailLight);

            // الدخان من العادم (particle system)
            createExhaustParticles();

            car.position.set(0, 0, 0);
            scene.add(car);
        }

        function createExhaustParticles() {
            // نظام جزيئات الدخان
            const particleCount = 100;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            
            for(let i = 0; i < particleCount * 3; i++) {
                positions[i] = 0;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x888888,
                size: 0.5,
                transparent: true,                opacity: 0.6
            });
            
            const particles = new THREE.Points(geometry, material);
            particles.userData = { velocities: [] };
            
            for(let i = 0; i < particleCount; i++) {
                particles.userData.velocities.push({
                    x: 0, y: 0, z: 0,
                    life: 0
                });
            }
            
            scene.add(particles);
            car.userData.exhaustParticles = particles;
        }

        // ==================== البيئة المحيطة ====================
        function createEnvironment() {
            // الأرضية (العشب)
            const groundGeometry = new THREE.PlaneGeometry(2000, 2000);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x3d5c3d,
                roughness: 1,
                metalness: 0
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);

            // المدرجات والجمهور
            createStands();

            // الأعلام
            createFlags();

            // الأبراج
            createTowers();
        }

        function createStands() {
            // المدرجات
            const standMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const radius = 400;
                                const standGeometry = new THREE.BoxGeometry(60, 20, 30);
                const stand = new THREE.Mesh(standGeometry, standMaterial);
                
                stand.position.set(
                    Math.cos(angle) * radius,
                    10,
                    Math.sin(angle) * radius
                );
                stand.lookAt(0, 10, 0);
                stand.castShadow = true;
                scene.add(stand);
            }
        }

        function createFlags() {
            // أعلام ملونة
            const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff];
            
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 350 + Math.random() * 100;
                
                // عمود العلم
                const poleGeometry = new THREE.CylinderGeometry(0.2, 0.2, 15);
                const poleMaterial = new THREE.MeshStandardMaterial({ color: 0x666666 });
                const pole = new THREE.Mesh(poleGeometry, poleMaterial);
                
                pole.position.set(
                    Math.cos(angle) * radius,
                    7.5,
                    Math.sin(angle) * radius
                );
                scene.add(pole);

                // العلم
                const flagGeometry = new THREE.BoxGeometry(4, 2.5, 0.1);
                const flagMaterial = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
                const flag = new THREE.Mesh(flagGeometry, flagMaterial);
                
                flag.position.set(
                    Math.cos(angle) * radius + 2,
                    14,
                    Math.sin(angle) * radius
                );
                scene.add(flag);
            }
        }
        function createTowers() {
            // أبراج المراقبة
            const towerMaterial = new THREE.MeshStandardMaterial({
                color: 0x444444,
                roughness: 0.7
            });

            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2;
                const radius = 380;
                
                const towerGeometry = new THREE.BoxGeometry(15, 50, 15);
                const tower = new THREE.Mesh(towerGeometry, towerMaterial);
                
                tower.position.set(
                    Math.cos(angle) * radius,
                    25,
                    Math.sin(angle) * radius
                );
                tower.castShadow = true;
                scene.add(tower);
            }
        }

        // ==================== التحكم ====================
        function setupEventListeners() {
            // لوحة المفاتيح
            const keys = {};
            
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                
                // تبديل الكاميرا
                if (e.code === 'KeyC') {
                    toggleCamera();
                }
            });
            
            document.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            // زر البدء
            document.getElementById('startButton').addEventListener('click', () => {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('speedometer').style.display = 'flex';
                document.getElementById('lapCounter').style.display = 'block';
                document.getElementById('minimap').style.display = 'block';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('viewToggle').style.display = 'block';                gameRunning = true;
            });

            // زر تبديل المنظور
            document.getElementById('viewToggle').addEventListener('click', toggleCamera);

            // تحديث الفيزياء
            window.addEventListener('keydown', (e) => handleKeyPress(e, true));
            window.addEventListener('keyup', (e) => handleKeyPress(e, false));

            // تغيير حجم النافذة
            window.addEventListener('resize', onWindowResize, false);
        }

        function handleKeyPress(event, isPressed) {
            const value = isPressed ? 1 : 0;
            
            switch(event.code) {
                case 'KeyW':
                case 'ArrowUp':
                    acceleration = value;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    acceleration = -value;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    steering = value;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    steering = -value;
                    break;
                case 'Space':
                    carPhysics.braking = isPressed ? 2.0 : 1.0;
                    break;
            }
        }

        function toggleCamera() {
            cameraView = cameraView === 'external' ? 'internal' : 'external';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        // ==================== تحديث السيارة ====================
        function updateCar(delta) {
            if (!gameRunning) return;

            // التسريع
            if (acceleration > 0) {
                carPhysics.velocity += carPhysics.acceleration;
            } else if (acceleration < 0) {
                carPhysics.velocity -= carPhysics.braking;
            }

            // الاحتكاك
            carPhysics.velocity *= carPhysics.friction;

            // الحد الأقصى للسرعة
            if (carPhysics.velocity > maxSpeed) {
                carPhysics.velocity = maxSpeed;
            }

            // التوجيه
            if (Math.abs(carPhysics.velocity) > 1) {
                const turnAmount = carPhysics.turnSpeed * (carPhysics.velocity / maxSpeed);
                carPhysics.angle += steering * turnAmount;
            }

            // تحديث الموقع
            carPosition.x += Math.sin(carPhysics.angle) * carPhysics.velocity * 0.01;
            carPosition.z += Math.cos(carPhysics.angle) * carPhysics.velocity * 0.01;

            // تطبيق الحركة على السيارة
            car.position.x = carPosition.x;
            car.position.z = carPosition.z;
            car.rotation.y = carPhysics.angle;

            // تحديث السرعة المعروضة
            speed = Math.abs(Math.floor(carPhysics.velocity));
            document.getElementById('speedValue').textContent = speed;

            // تدوير العجلات
            wheels.forEach(wheel => {
                wheel.rotation.x += carPhysics.velocity * 0.01;
            });

            // تحديث الكاميرا
            updateCamera();

            // تحديث الخريطة المصغرة
            updateMinimap();
        }
        function updateCamera() {
            if (cameraView === 'external') {
                // المنظور الخارجي (كما في الصورة 1)
                const relativeCameraOffset = new THREE.Vector3(0, 5, -12);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(car.position.x, car.position.y + 2, car.position.z);
            } else {
                // المنظور الداخلي (كما في الصورة 2)
                const relativeCameraOffset = new THREE.Vector3(0, 2.2, 0.5);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                
                camera.position.copy(cameraOffset);
                
                const lookAtOffset = new THREE.Vector3(0, 2, 10);
                const lookAtPosition = lookAtOffset.applyMatrix4(car.matrixWorld);
                camera.lookAt(lookAtPosition);
            }
        }

        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const ctx = canvas.getContext('2d');
            canvas.width = 250;
            canvas.height = 200;

            // مسح الخريطة
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, 250, 200);

            // رسم الحلبة
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 20;
            ctx.beginPath();
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const radius = 100 + Math.sin(angle * 4) * 16;
                const x = 125 + Math.cos(angle) * radius * 0.4;
                const y = 100 + Math.sin(angle) * radius * 0.4;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            // رسم موقع السيارة            const carX = 125 + carPosition.x * 0.4;
            const carY = 100 + carPosition.z * 0.4;
            
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(carX, carY, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        // ==================== الحلقة الرئيسية ====================
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            updateCar(delta);

            renderer.render(scene, camera);
        }

        // ==================== بدء اللعبة ====================
        window.onload = init;
    </script>
</body>
</html>
