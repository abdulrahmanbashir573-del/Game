<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سباق السرعة - لعبة سباق السيارات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        /* شاشة البداية */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
        }

        #startScreen h1 {
            font-size: 72px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(0,255,255,0.5);
        }

        #startScreen p {            font-size: 24px;
            margin: 20px;
            color: #cccccc;
        }

        #startButton {
            padding: 20px 60px;
            font-size: 28px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,255,255,0.4);
            transition: all 0.3s;
        }

        #startButton:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 60px rgba(0,255,255,0.6);
        }

        /* عداد السرعة */
        #speedometer {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
            border-radius: 50%;
            border: 4px solid #00ffff;
            box-shadow: 0 0 30px rgba(0,255,255,0.5);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }

        #speedValue {
            font-size: 64px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0,255,255,0.8);
        }
        #speedLabel {
            font-size: 20px;
            color: #fff;
        }

        /* الخريطة */
        #minimap {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 250px;
            height: 200px;
            background: rgba(0,0,0,0.7);
            border: 3px solid #00ffff;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }

        /* التحكم */
        #controls {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            color: white;
            display: none;
            z-index: 100;
        }

        #controls h3 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        #controls p {
            margin: 5px 0;
            font-size: 14px;
        }

        /* زر الكاميرا */
        #viewToggle {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            padding: 15px 30px;            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,255,255,0.4);
            z-index: 100;
            display: none;
            transition: all 0.3s;
        }

        #viewToggle:hover {
            transform: translateY(-50%) scale(1.05);
        }
    </style>
</head>
<body>
    <!-- شاشة البداية -->
    <div id="startScreen">
        <h1>🏁 سباق السرعة 🏁</h1>
        <p>لعبة سباق السيارات الواقعية</p>
        <button id="startButton" onclick="startGame()">ابدأ السباق</button>
    </div>

    <!-- عداد السرعة -->
    <div id="speedometer">
        <div id="speedValue">0</div>
        <div id="speedLabel">km/h</div>
    </div>

    <!-- الخريطة -->
    <canvas id="minimap"></canvas>

    <!-- التحكم -->
    <div id="controls">
        <h3>🎮 التحكم</h3>
        <p>⬆️ W أو السهم للأعلى: تسريع</p>
        <p>⬇️ S أو السهم للأسفل: فرامل</p>
        <p>⬅️ ️ A/D: اتجاه</p>
        <p>C: تبديل الكاميرا</p>
    </div>

    <!-- زر الكاميرا -->
    <button id="viewToggle" onclick="toggleCamera()">تبديل المنظور</button>

    <!-- مساحة اللعبة -->
    <div id="gameContainer"></div>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // المتغيرات العامة
        let scene, camera, renderer;
        let car, carBody, wheels = [];
        let speed = 0;
        let maxSpeed = 287;
        let gameRunning = false;
        let cameraView = 'external';
        let carPosition = { x: 0, z: 0 };
        let carPhysics = {
            velocity: 0,
            angle: 0,
            friction: 0.98,
            acceleration: 0.5,
            turnSpeed: 0.04
        };
        let keys = {};

        // دالة بدء اللعبة
        function startGame() {
            console.log("Game starting...");
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('speedometer').style.display = 'flex';
            document.getElementById('minimap').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            document.getElementById('viewToggle').style.display = 'block';
            gameRunning = true;
        }

        // تهيئة اللعبة
        function init() {
            // المشهد
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87CEEB, 100, 1000);

            // الكاميرا
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                2000
            );

            // الريندر
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;            document.getElementById('gameContainer').appendChild(renderer.domElement);

            // الإضاءة
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1);
            sunLight.position.set(100, 200, 100);
            sunLight.castShadow = true;
            scene.add(sunLight);

            // إنشاء الحلبة
            createTrack();

            // إنشاء السيارة
            createCar();

            // البيئة
            createEnvironment();

            // الأحداث
            setupEventListeners();

            // البدء
            animate();
        }

        // إنشاء الحلبة
        function createTrack() {
            const trackShape = new THREE.Shape();
            const trackRadius = 300;
            const trackWidth = 40;
            
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const radius = trackRadius + Math.sin(angle * 4) * 50;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                if (i === 0) {
                    trackShape.moveTo(x, z);
                } else {
                    trackShape.lineTo(x, z);
                }
            }

            const roadGeometry = new THREE.ExtrudeGeometry(trackShape, {
                depth: trackWidth,
                bevelEnabled: false
            });
            const roadMaterial = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.8
            });

            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.1;
            road.receiveShadow = true;
            scene.add(road);

            // الأرضية
            const groundGeometry = new THREE.PlaneGeometry(2000, 2000);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3d5c3d });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            scene.add(ground);
        }

        // إنشاء السيارة
        function createCar() {
            car = new THREE.Group();

            const bodyGeometry = new THREE.BoxGeometry(2.5, 1, 5);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: 0x0066ff,
                roughness: 0.2,
                metalness: 0.8
            });
            carBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
            carBody.position.y = 1;
            carBody.castShadow = true;
            car.add(carBody);

            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
            const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });

            const wheelPositions = [
                [-1.4, 0.5, 1.5],
                [1.4, 0.5, 1.5],
                [-1.4, 0.5, -1.5],
                [1.4, 0.5, -1.5]
            ];

            wheelPositions.forEach((pos) => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);                wheel.castShadow = true;
                car.add(wheel);
                wheels.push(wheel);
            });

            car.position.set(0, 0, 0);
            scene.add(car);
        }

        // البيئة
        function createEnvironment() {
            // أعلام
            const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00];
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 350 + Math.random() * 100;
                
                const poleGeometry = new THREE.CylinderGeometry(0.2, 0.2, 15);
                const poleMaterial = new THREE.MeshStandardMaterial({ color: 0x666666 });
                const pole = new THREE.Mesh(poleGeometry, poleMaterial);
                pole.position.set(Math.cos(angle) * radius, 7.5, Math.sin(angle) * radius);
                scene.add(pole);

                const flagGeometry = new THREE.BoxGeometry(4, 2.5, 0.1);
                const flagMaterial = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
                const flag = new THREE.Mesh(flagGeometry, flagMaterial);
                flag.position.set(Math.cos(angle) * radius + 2, 14, Math.sin(angle) * radius);
                scene.add(flag);
            }
        }

        // الأحداث
        function setupEventListeners() {
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyC') toggleCamera();
            });
            
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        // تبديل الكاميرا
        function toggleCamera() {
            cameraView = cameraView === 'external' ? 'internal' : 'external';
        }

        // تحديث السيارة
        function updateCar() {
            if (!gameRunning) return;

            if (keys['KeyW'] || keys['ArrowUp']) {
                carPhysics.velocity += carPhysics.acceleration;
            }
            if (keys['KeyS'] || keys['ArrowDown']) {
                carPhysics.velocity -= 1.0;
            }

            carPhysics.velocity *= carPhysics.friction;

            if (carPhysics.velocity > maxSpeed) carPhysics.velocity = maxSpeed;

            if (Math.abs(carPhysics.velocity) > 1) {
                const turnAmount = carPhysics.turnSpeed * (carPhysics.velocity / maxSpeed);
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    carPhysics.angle += turnAmount;
                }
                if (keys['KeyD'] || keys['ArrowRight']) {
                    carPhysics.angle -= turnAmount;
                }
            }

            carPosition.x += Math.sin(carPhysics.angle) * carPhysics.velocity * 0.01;
            carPosition.z += Math.cos(carPhysics.angle) * carPhysics.velocity * 0.01;

            car.position.x = carPosition.x;
            car.position.z = carPosition.z;
            car.rotation.y = carPhysics.angle;

            speed = Math.abs(Math.floor(carPhysics.velocity));
            document.getElementById('speedValue').textContent = speed;

            updateCamera();
            updateMinimap();
        }

        // تحديث الكاميرا
        function updateCamera() {
            if (cameraView === 'external') {
                const relativeCameraOffset = new THREE.Vector3(0, 5, -12);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(car.position.x, car.position.y + 2, car.position.z);
            } else {
                const relativeCameraOffset = new THREE.Vector3(0, 2.2, 0.5);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                camera.position.copy(cameraOffset);
                const lookAtOffset = new THREE.Vector3(0, 2, 10);
                const lookAtPosition = lookAtOffset.applyMatrix4(car.matrixWorld);
                camera.lookAt(lookAtPosition);
            }
        }

        // تحديث الخريطة
        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const ctx = canvas.getContext('2d');
            canvas.width = 250;
            canvas.height = 200;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, 250, 200);

            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 20;
            ctx.beginPath();
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const radius = 100 + Math.sin(angle * 4) * 16;
                const x = 125 + Math.cos(angle) * radius * 0.4;
                const y = 100 + Math.sin(angle) * radius * 0.4;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            const carX = 125 + carPosition.x * 0.4;
            const carY = 100 + carPosition.z * 0.4;
            
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(carX, carY, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        // الحلقة الرئيسية
        function animate() {            requestAnimationFrame(animate);
            updateCar();
            renderer.render(scene, camera);
        }

        // تشغيل اللعبة
        window.onload = init;
    </script>
</body>
</html>
